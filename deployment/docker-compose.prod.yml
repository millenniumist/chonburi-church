services:
  nextjs-app:
    image: nextjs-app:latest
    container_name: nextjs-app-prod
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      TZ: Asia/Bangkok
      PORT: 8358
      DATABASE_URL: ${DATABASE_URL_PROD:?DATABASE_URL_PROD is required}
      # Right-size V8 heap below the container limit so GC runs before the cgroup
      # OOM-kills the process; widen the libuv pool for sharp/pg work.
      NODE_OPTIONS: --max-old-space-size=1024
      UV_THREADPOOL_SIZE: 8
    ports:
      - "8359:8358"
    restart: unless-stopped
    # Cap the blast radius on a swap-saturated Pi co-located with other containers.
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 2.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network-prod

networks:
  app-network-prod:
    driver: bridge
